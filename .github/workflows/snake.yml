name: Generate Snake
on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Platane/snk@v3
        with:
          github_user_name: Gabriel-Pacheco-K
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%23bd34e0&color_dots=%23103514,%230e4429,%2326a641,%2339d353,%2356f77e&color_bg=%230d1117
            dist/github-contribution-grid-snake-dark.svg?color_snake=%23bd34e0&color_dots=%23103514,%230e4429,%2326a641,%2339d353,%2356f77e&color_bg=%230d1117
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
